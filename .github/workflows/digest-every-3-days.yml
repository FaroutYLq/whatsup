name: ArXiv Digest Weekly

on:
  schedule:
    # Target: every Thursday 17:00 America/Chicago. GitHub cron is UTC
    # only and ignores DST, so we fire at BOTH possible UTC times and a
    # guard step below keeps only the fire where Chicago local time is
    # actually 17:00 — exactly one run per Thursday year-round.
    #   22:00 UTC = 17:00 CDT (summer, UTC-5)
    #   23:00 UTC = 17:00 CST (winter, UTC-6)
    # Pair with arxiv.max_days_back: 7 so each run covers the full week.
    - cron: "0 22 * * 4"
    - cron: "0 23 * * 4"
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest

    # Needed by the keepalive step to push an activity commit.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Keep only the scheduled fire that lands on 17:00 Chicago; the
      # other UTC fire (22:00 vs 23:00) is 16:00/18:00 local and skips.
      - name: Guard to Thursday 17:00 America/Chicago
        id: guard
        if: github.event_name == 'schedule'
        run: |
          dow=$(TZ="America/Chicago" date +%u)   # 1=Mon .. 7=Sun; Thu=4
          hour=$(TZ="America/Chicago" date +%H)
          echo "Chicago local time: dow=$dow hour=$hour"
          if [ "$dow" = "4" ] && [ "$hour" = "17" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Matched Thursday 17:00 Chicago."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not Thursday 17:00 Chicago; skipping this fire."
          fi

      # GitHub disables scheduled workflows after 60 days without repo
      # activity, which would silently stop the digest. This pushes a
      # lightweight activity marker as the 60-day mark approaches.
      - name: Keep scheduled workflow alive
        if: github.event_name == 'schedule' && steps.guard.outputs.should_run == 'true'
        uses: gautamkrishnar/keepalive-workflow@v2

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Write runtime config
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.should_run == 'true'
        env:
          WHATSUP_CONFIG_YAML: ${{ secrets.WHATSUP_CONFIG_YAML }}
        run: |
          if [ -z "$WHATSUP_CONFIG_YAML" ]; then
            echo "Missing required secret: WHATSUP_CONFIG_YAML"
            exit 1
          fi
          printf '%s\n' "$WHATSUP_CONFIG_YAML" > config.yaml

      - name: Write optional Zotero library
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.should_run == 'true'
        env:
          WHATSUP_ZOTERO_BIB: ${{ secrets.WHATSUP_ZOTERO_BIB }}
          WHATSUP_ZOTERO_BIB_GZ_B64_01: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_01 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_02: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_02 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_03: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_03 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_04: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_04 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_05: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_05 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_06: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_06 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_07: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_07 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_08: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_08 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_09: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_09 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_10: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_10 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_11: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_11 }}
          WHATSUP_ZOTERO_BIB_GZ_B64_12: ${{ secrets.WHATSUP_ZOTERO_BIB_GZ_B64_12 }}
        run: |
          if [ -n "$WHATSUP_ZOTERO_BIB_GZ_B64_01" ]; then
            : > /tmp/my_library.bib.gz.b64
            for i in $(seq -w 1 12); do
              var_name="WHATSUP_ZOTERO_BIB_GZ_B64_${i}"
              part="${!var_name:-}"
              if [ -n "$part" ]; then
                printf '%s' "$part" >> /tmp/my_library.bib.gz.b64
              fi
            done
            base64 --decode /tmp/my_library.bib.gz.b64 | gzip --decompress > my_library.bib
            echo "Reconstructed my_library.bib from chunked secrets."
          elif [ -n "$WHATSUP_ZOTERO_BIB" ]; then
            printf '%s\n' "$WHATSUP_ZOTERO_BIB" > my_library.bib
            echo "Wrote my_library.bib from single secret."
          else
            echo "WHATSUP_ZOTERO_BIB not set; running without Zotero file."
          fi

      - name: Run digest
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.should_run == 'true'
        run: python src/main.py config.yaml
